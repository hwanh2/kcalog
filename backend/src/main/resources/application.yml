spring:
  application:
    name: kcalog-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/kcalog}
    username: ${DB_USERNAME:kcalog}
    password: ${DB_PASSWORD:kcalog}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:kakao-client-id-placeholder}
            client-secret: ${KAKAO_CLIENT_SECRET:placeholder}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            client-name: Kakao
            # account_email은 카카오 앱 동의항목 설정 후 추가 (README 참고)
            scope: profile_nickname
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  jwt:
    # HS256 서명 키 — 32바이트 이상. 운영에서는 반드시 환경변수로 주입한다.
    secret: ${JWT_SECRET:kcalog-local-dev-only-secret-key-32bytes!}
    access-token-ttl: 30m
  refresh-token:
    ttl: 14d
