services:
  db:
    image: postgres:16-alpine
    container_name: kcalog-db
    environment:
      POSTGRES_DB: kcalog
      POSTGRES_USER: kcalog
      POSTGRES_PASSWORD: kcalog
    ports:
      # 로컬 전용 — 외부 인터페이스에 노출하지 않는다
      - "127.0.0.1:5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kcalog"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
