name: CI

on:
  pull_request:
  push:
    branches: [main]

# 최소 권한 — 쓰기 권한은 필요한 잡에서만 개별 부여
permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # 커버리지 코멘트 게시용
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      # 통합 테스트는 Testcontainers가 Postgres를 직접 띄운다 (별도 서비스 컨테이너 불필요)
      - run: ./gradlew build
      - name: 커버리지 PR 코멘트 (측정 전용, 게이트 없음)
        if: github.event_name == 'pull_request'
        # 서드파티 액션은 커밋 SHA로 핀 고정 (태그 바꿔치기 방지)
        uses: madrapps/jacoco-report@7c362aca34caf958e7b1c03464bd8781db9f8da7 # v1.7.1
        with:
          paths: backend/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: 백엔드 커버리지
          update-comment: true
          # 게이트 없음 방침 — 기준 미달 ❌ 이모지가 뜨지 않게 0으로
          min-coverage-overall: 0
          min-coverage-changed-files: 0

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
